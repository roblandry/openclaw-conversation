repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check .
        language: python
        pass_filenames: false
        additional_dependencies:
          - ruff==0.14.9

      - id: ruff-format
        name: ruff format
        entry: ruff format .
        language: python
        pass_filenames: false
        additional_dependencies:
          - ruff==0.14.9

