name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to write to manifest.json, e.g. 0.4.3"
        required: true
        type: string
      create_tag:
        description: "Create the matching v<version> tag and dispatch the Release workflow"
        default: false
        required: true
        type: boolean
      draft:
        description: "Create the GitHub release as a draft when dispatching Release"
        default: true
        required: true
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease when dispatching Release"
        default: false
        required: true
        type: boolean

permissions:
  actions: write
  contents: write

env:
  MANIFEST_PATH: custom_components/openclaw_conversation/manifest.json

jobs:
  bump:
    name: Bump manifest version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Update manifest version
        id: version
        env:
          VERSION: ${{ inputs.version }}
          CREATE_TAG: ${{ inputs.create_tag }}
        run: |
          python <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"].strip()
          if version.startswith("v"):
              raise SystemExit("Use a plain version here, e.g. 0.4.3, not v0.4.3.")
          if not re.fullmatch(r"\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?", version):
              raise SystemExit(f"Invalid version: {version}")

          manifest_path = Path(os.environ["MANIFEST_PATH"])
          data = json.loads(manifest_path.read_text())
          current = data.get("version")
          changed = current != version
          if changed:
              data["version"] = version
              manifest_path.write_text(json.dumps(data, indent=2) + "\n")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a") as output:
              print(f"changed={str(changed).lower()}", file=output)
          PY

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Commit version bump
        if: ${{ steps.version.outputs.changed == 'true' }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${MANIFEST_PATH}"
          git commit -m "chore: bump version to ${VERSION}"
          git push

      - name: Create and push release tag
        if: ${{ inputs.create_tag }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Dispatch release workflow
        if: ${{ inputs.create_tag }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          DRAFT: ${{ inputs.draft }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          gh workflow run release.yaml \
            --ref main \
            -f tag="${TAG}" \
            -f draft="${DRAFT}" \
            -f prerelease="${PRERELEASE}"

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          CREATE_TAG: ${{ inputs.create_tag }}
          CHANGED: ${{ steps.version.outputs.changed }}
        run: |
          {
            echo "## Prepared release ${VERSION}"
            echo ""
            echo "- Updated \`${MANIFEST_PATH}\`"
            if [ "${CHANGED}" = "true" ]; then
              echo "- Committed \`chore: bump version to ${VERSION}\`"
            else
              echo "- Manifest was already at \`${VERSION}\`"
            fi
            if [ "${CREATE_TAG}" = "true" ]; then
              echo "- Ensured \`${TAG}\` exists"
              echo "- Dispatched the Release workflow for \`${TAG}\`"
            else
              echo "- Did not create a tag. Run the Release workflow with \`${TAG}\` when ready."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
