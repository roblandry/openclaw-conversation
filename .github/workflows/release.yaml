name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.4.3"
        required: true
        type: string
      draft:
        description: "Create the GitHub release as a draft"
        default: true
        required: true
        type: boolean
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        default: false
        required: true
        type: boolean

permissions:
  contents: write

env:
  DOMAIN: openclaw_conversation

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate
        run: |
          ruff check .
          ruff format --check .
          pyright
          pytest -q

      - name: Resolve release metadata
        id: metadata
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            draft="${{ inputs.draft }}"
            prerelease="${{ inputs.prerelease }}"
          else
            tag="${GITHUB_REF_NAME}"
            draft="false"
            prerelease="false"
          fi

          version="${tag#v}"
          manifest_version="$(python -c 'import json; print(json.load(open("custom_components/openclaw_conversation/manifest.json"))["version"])')"

          if [ "${version}" != "${manifest_version}" ]; then
            echo "Tag ${tag} does not match manifest version ${manifest_version}."
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "draft=${draft}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Build release archive
        run: |
          mkdir -p dist
          cd "custom_components/${DOMAIN}"
          zip -r "../../dist/${DOMAIN}.zip" . \
            -x "__pycache__/*" \
            -x "*/__pycache__/*" \
            -x "*.pyc"

      - name: Generate release notes
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_VERSION: ${{ steps.metadata.outputs.version }}
          DOMAIN: ${{ env.DOMAIN }}
        with:
          script: |
            const fs = require("fs");

            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;
            const domain = process.env.DOMAIN;

            const generated = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: context.sha,
            });

            const body = [
              `## OpenClaw Conversation ${version}`,
              "",
              "### Installation",
              `- HACS users can update to this release normally once HACS detects ${tag}.`,
              `- Manual installs can use the attached \`${domain}.zip\` release asset.`,
              "",
              "### Validation",
              "- Ruff check and format check",
              "- Pyright strict type checking",
              "- Pytest suite",
              "",
              "### Changes",
              generated.data.body.trim(),
              "",
            ].join("\n");

            fs.writeFileSync("release-notes.md", body);
            await core.summary.addRaw(body).write();

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: OpenClaw Conversation ${{ steps.metadata.outputs.version }}
          body_path: release-notes.md
          files: dist/openclaw_conversation.zip
          draft: ${{ steps.metadata.outputs.draft }}
          prerelease: ${{ steps.metadata.outputs.prerelease }}
